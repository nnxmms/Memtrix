services:

  ############ Memtrix ############
  memtrix:
    build: .
    image: memtrix
    user: "1000:1000"  # run as memtrix (non-root)
    read_only: true    # immutable root filesystem
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp           # writable scratch space for Python internals
    env_file:
      - .env           # secrets (access tokens, API keys)
    volumes:
      - ./workspace:/home/memtrix/workspace   # persistent workspace (AGENT.md, MEMORY.md, memory/, …)
      - ./data:/home/memtrix/data             # persistent data (config.json, …)
    restart: unless-stopped
    depends_on:
      - conduit
      - searxng
    networks:
      - matrix

  ############ Conduit (Matrix homeserver) ############
  conduit:
    image: matrixconduit/matrix-conduit:latest
    environment:
      CONDUIT_CONFIG: /etc/conduit.toml
    ports:
      - "6167:6167"
    restart: unless-stopped
    volumes:
      - conduit_data:/var/lib/matrix-conduit
      - ./src/static/conduit.toml:/etc/conduit.toml:ro
    networks:
      - matrix

  ############ SearXNG (web search) ############
  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./src/static/searxng:/etc/searxng:ro
    restart: unless-stopped
    networks:
      - matrix

volumes:

  ############ Conduit ############
  conduit_data:

networks:

  ############ Matrix ############
  matrix:
