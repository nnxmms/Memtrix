services:

  # ── Nginx (web server) ──
  nginx:
    image: nginx:1-alpine
    container_name: memtrix-web
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # binding ports 80/443
      - CHOWN             # nginx cache dir ownership
      - SETUID            # worker process privilege drop
      - SETGID            # worker process privilege drop
    # Reload config every 6h to pick up renewed certificates
    command: /bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./docs.html:/usr/share/nginx/html/docs.html:ro
      - ./static:/usr/share/nginx/html/static:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # Nginx needs writable log dir
      - nginx-logs:/var/log/nginx
    networks:
      - web

  # ── Certbot (automatic certificate renewal via Cloudflare DNS-01) ──
  certbot:
    image: certbot/dns-cloudflare
    container_name: memtrix-certbot
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./certbot/cloudflare.ini:/etc/cloudflare.ini:ro
    # Attempt renewal every 12 hours (certbot is smart — only renews when needed)
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --dns-cloudflare --dns-cloudflare-credentials /etc/cloudflare.ini --quiet; sleep 43200; done'
    networks:
      - web

volumes:
  nginx-logs:

networks:
  web:
    driver: bridge
